name: Release assets

on:
  release:
    types: [published]
  push:
    branches: [main]
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  prepare-release:
    name: Prepare release version
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.release.outputs.release_tag }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve or prepare release tag
        id: release
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          RELEASE_EVENT_TAG: ${{ github.event.release.tag_name || '' }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "push" && "$REF_TYPE" == "branch" && "$REF_NAME" == "main" ]]; then
            git fetch origin --force --tags
            LATEST_TAG="$(git tag --list 'v*' --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)"
            if [[ -z "$LATEST_TAG" ]]; then
              echo "No stable v<major>.<minor>.<patch> tag exists" >&2
              exit 1
            fi
            CURRENT_VERSION="${LATEST_TAG#v}"
            if [[ "$CURRENT_VERSION" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              MAJOR="${BASH_REMATCH[1]}"
              MINOR="${BASH_REMATCH[2]}"
              PATCH="${BASH_REMATCH[3]}"
            else
              echo "Unsupported latest release tag: $LATEST_TAG" >&2
              exit 1
            fi
            NEXT_PATCH=$((10#${PATCH} + 1))
            NEXT_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}"
            RELEASE_TAG="v${NEXT_VERSION}"

            node scripts/release/prepare-version.mjs "$NEXT_VERSION"
            git -c core.whitespace=cr-at-eol diff --check
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add CHANGELOG.md Cargo.toml Cargo.lock \
              apps/codex-plus-manager/package.json \
              apps/codex-plus-manager/package-lock.json \
              apps/codex-plus-manager/src-tauri/tauri.conf.json
            git commit -m "release: prepare ${RELEASE_TAG} [skip ci]"
            git push origin HEAD:main
            git tag -a "$RELEASE_TAG" -m "Release $RELEASE_TAG"
            git push origin "$RELEASE_TAG"
          elif [[ "$EVENT_NAME" == "release" ]]; then
            RELEASE_TAG="$RELEASE_EVENT_TAG"
          elif [[ "$REF_TYPE" == "tag" && "$REF_NAME" == v* ]]; then
            RELEASE_TAG="$REF_NAME"
          else
            echo "Unsupported release trigger: event=$EVENT_NAME ref=$REF_TYPE/$REF_NAME" >&2
            exit 1
          fi
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

  ensure-release:
    name: Ensure GitHub Release
    needs: prepare-release
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ needs.prepare-release.outputs.release_tag }}
    steps:
      - name: Create GitHub Release when missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
        shell: bash
        run: |
          if ! gh release view "$RELEASE_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" --repo "${{ github.repository }}" --verify-tag --generate-notes --title "$RELEASE_TAG"
          fi

  windows-installer:
    needs: ensure-release
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ needs.ensure-release.outputs.release_tag }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install NSIS
        run: choco install nsis -y

      - name: Install frontend dependencies
        working-directory: apps/codex-plus-manager
        run: npm install --package-lock=false

      - name: Build frontend
        working-directory: apps/codex-plus-manager
        run: npm run vite:build

      - name: Build binaries
        run: cargo build --release

      - name: Stage Windows app files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/windows/app | Out-Null
          Copy-Item target/release/codex-deck.exe dist/windows/app/

      - name: Build Windows installer
        shell: pwsh
        run: |
          $version = "${{ env.RELEASE_TAG }}".TrimStart("v", "V")
          $makensis = "${env:ProgramFiles(x86)}\NSIS\makensis.exe"
          if (-not (Test-Path $makensis)) {
            $makensis = "makensis"
          }
          Push-Location scripts/installer/windows
          & $makensis "/INPUTCHARSET" "UTF8" "/DVERSION=$version" CodexPlusPlus.nsi
          Pop-Location

      - name: Upload Windows installer
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: dist/windows/*.exe

  macos-dmg:
    name: macOS DMG (${{ matrix.arch }})
    needs: ensure-release
    runs-on: ${{ matrix.runner }}
    env:
      RELEASE_TAG: ${{ needs.ensure-release.outputs.release_tag }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
            target: x86_64-apple-darwin
          - arch: arm64
            runner: macos-14
            target: aarch64-apple-darwin
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        working-directory: apps/codex-plus-manager
        run: npm install --package-lock=false

      - name: Build frontend
        working-directory: apps/codex-plus-manager
        run: npm run vite:build

      - name: Build binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build macOS DMG
        run: |
          VERSION="${RELEASE_TAG#v}"
          VERSION="${VERSION#V}"
          BINARY_DIR="$PWD/target/${{ matrix.target }}/release" bash scripts/installer/macos/package-dmg.sh "$VERSION" "${{ matrix.arch }}"

      - name: Verify macOS bundle structure
        run: |
          set -euo pipefail
          test -L "dist/macos/stage/Applications"
          test "$(readlink "dist/macos/stage/Applications")" = "/Applications"
          for app in "dist/macos/stage/Codex Deck.app" "dist/macos/stage/Codex Deck 管理工具.app"; do
            test -f "$app/Contents/Info.plist"
            test -f "$app/Contents/PkgInfo"
            test -x "$app/Contents/MacOS/$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$app/Contents/Info.plist")"
            plutil -lint "$app/Contents/Info.plist" >/dev/null
            codesign -dv "$app" >/dev/null 2>&1
            echo "verified: $app"
          done

      - name: Upload macOS DMG
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: dist/macos/*.dmg

  latest-json:
    name: Upload static latest.json
    runs-on: ubuntu-latest
    if: ${{ always() && needs.ensure-release.result == 'success' && needs.windows-installer.result == 'success' }}
    needs:
      - ensure-release
      - windows-installer
      - macos-dmg
    env:
      RELEASE_TAG: ${{ needs.ensure-release.outputs.release_tag }}
    steps:
      - name: Generate latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ env.RELEASE_TAG }}
        shell: bash
        run: |
          set -euo pipefail
          gh release view "$TAG" --repo "$REPO" --json assets,body,tagName,url > release.json
          node <<'NODE'
          const fs = require("fs");
          const release = JSON.parse(fs.readFileSync("release.json", "utf8"));
          const repo = process.env.REPO;
          const tag = release.tagName || process.env.TAG;
          const version = tag.replace(/^v/i, "");
          const baseUrl = `https://github.com/${repo}/releases/download/${tag}`;
          const assets = (release.assets || [])
            .map((asset) => asset.name)
            .filter((name) => name !== "latest.json")
            .map((name) => ({ name, url: `${baseUrl}/${encodeURIComponent(name)}` }));
          const payload = {
            version: `v${version}`,
            url: release.url || `https://github.com/${repo}/releases/tag/${tag}`,
            body: release.body || "",
            assets
          };
          fs.writeFileSync("latest.json", `${JSON.stringify(payload, null, 2)}\n`);
          NODE
          cat latest.json

      - name: Upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ env.RELEASE_TAG }}
          REPO: ${{ github.repository }}
        shell: bash
        run: gh release upload "$TAG" latest.json --clobber --repo "$REPO"
